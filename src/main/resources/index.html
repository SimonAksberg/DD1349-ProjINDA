<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <meta charset="utf-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>To Do's</h1>

    <div class="topBar"></div>
        <div class="listControls"></div>
            <input class="listInput" placeholder="Create a new list">
            <button onclick="addList()">Add List</button>
        </div>

        <button onclick="toggleCompletedTaskVisibility()">Show/Hide Completed Tasks</button>

    </div>

    <div id="listsContainer"></div>

    <script> 
        // Global variables
        let hideCompletedTasks = false;

        // Render data
        function loadLists() {
            fetch("/api/lists")
            .then(res => res.json())
            .then(lists => {
                const container = document.getElementById("listsContainer");
                container.innerHTML = "";

                lists.forEach(list => {
                    const div = createListElement(list.name, list.listId);
                    container.appendChild(div);
                    loadTasks(div);
                });
            });
        }

        function createListElement(listName, listId) {
            const div = document.createElement("div");

            div.className = "list";
            div.setAttribute("data-list-id", listId);

            div.innerHTML = `
                <div class="listHeader">
                    <h2>${listName}</h2>
                    <button onclick="toggleSettings(this)">⚙︎</button>
                </div>

                <div class="taskControls">
                    <input class="taskInput" placeholder="New task">
                    <button onclick="addTask(this)">Add</button>
                </div>

                <div class="settingsMenu" style="display: none;">
                    <button onclick="deleteList(this)">Delete</button>

                    <div>
                        <input class="renameInput" placeholder="New list name">
                        <button onclick="renameList(this)">Rename</button>
                    </div>
                </div>


                <ul class="taskList"></ul>
            `;

            return div;
        }

        function loadTasks(listDiv) {
            const listId = listDiv.dataset.listId;

            fetch(`/api/lists/${listId}/tasks`)
            .then(res => res.json())
            .then(tasks => {
                const taskList = listDiv.querySelector(".taskList");
                taskList.innerHTML = "";

                tasks.forEach(task => {
                    if (task.hasParent) return;
                    const li = createTaskElement(task);
                    taskList.appendChild(li);
                });
            });
        }

        function createTaskElement(task) {
            const li = document.createElement("li");

            li.className = "task";
            li.setAttribute("data-task-id", task.id);
            li.setAttribute("data-task-completion", task.completed)

            li.innerHTML = `
                <label class="taskContent">
                    <input type="checkbox" class="taskCheckbox" ${task.completed ? "checked" : ""}>
                    <span class="taskName">${task.name}</span>
                </label>

                <button onclick="toggleSettings(this)">⚙︎</button>

                <div class="settingsMenu" style="display: none;">
                    <div>
                        <input class="subtaskInput" placeholder="Add subtask">
                        <button onclick="addSubtask(this)">Add</button>
                    </div>
                    
                    <div>
                        <input class="renameInput" placeholder="New task name">
                        <button onclick="renameTask(this)">Rename</button>
                    </div>

                    <button onclick="deleteTask(this)">Delete</button>
                </div>
            `;

            const checkbox = li.querySelector(".taskCheckbox");
            checkbox.addEventListener("change", () =>  {
                updateTaskCompletion(li, task.id);
            });

            if (task.subtasks && task.subtasks.length > 0) {
                const subtaskUl = document.createElement("ul");
                subtaskUl.className = "taskList";
                for (const subtask of task.subtasks) {
                    subtaskUl.appendChild(createTaskElement(subtask));
                }
                li.appendChild(subtaskUl);
            }

            return li;
        }

        // Add data
        function addList() {
            const listName = getValidatedInput(document, "listInput")
            if (!listName) return;

            fetch("/api/lists", {
                method: "POST",
                body: listName
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                
                loadLists();
            });
        }

        function addTask(button) {
            const listDiv = getParentElement(button, "list");
            const listId = getParentElementId(button, "list");

            const taskName = getValidatedInput(listDiv, "taskInput");
            if (!taskName) return;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    taskName: taskName
                })
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);

                loadTasks(listDiv);
            });
        }

        function addSubtask(button) {
            const listId = getParentElementId(button, "list");
            const parentTaskId = getParentElementId(button, "task");

            const parentTask = getParentElement(button, "task");
            const taskName = getValidatedInput(parentTask, "subtaskInput");
            if (!taskName) return;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    parentTaskId: parentTaskId,
                    taskName: taskName
                })
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);

                const listDiv = getParentElement(button, "list");
                loadTasks(listDiv);
            });
        }

        // Modify data
        function renameList(button) {
            const listDiv = getParentElement(button, "list");
            const listId = getParentElementId(button, "list");

            const newName = getValidatedInput(listDiv, "renameInput");
            if (!newName) return;

            fetch("/api/lists", {
                method: "PUT",
                body: listId + "," + newName 
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadLists();
            });
        }

        function renameTask(button) {
            const listDiv = getParentElement(button, "list");
            const listId = getParentElementId(button, "list");

            const taskLi = getParentElement(button, "task");
            const taskId = getParentElementId(button, "task");

            const newName = getValidatedInput(taskLi, "renameInput");
            if (!newName) return;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "PUT",
                body: "rename" + "," + taskId + "," + newName 
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadTasks(listDiv);
            });
        }

        function updateTaskCompletion(li, taskId) {
            const listId = getParentElementId(li, "list")
            
            fetch(`/api/lists/${listId}/tasks`, {
                method: "PUT",
                body: "updateCompletion" + "," + taskId
            })
            .then(res => res.text())
            .then(data => console.log(data));
        }

        // Delete data 
        function deleteList(button) {
            const listId = getParentElementId(button, "list");

            fetch("/api/lists", {
                method: "DELETE",
                body: listId
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);

                loadLists();
            });
        }

        function deleteTask(button) {
            const listDiv = getParentElement(button, "list");
            const listId = getParentElementId(button, "list");
            const taskId = getParentElementId(button, "task");

            fetch(`/api/lists/${listId}/tasks`, {
                method: "DELETE",
                body: taskId
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);

                loadTasks(listDiv);
            });
        }

        function toggleCompletedTaskVisibility() {
            hideCompletedTasks = !hideCompletedTasks;

            const allTasks = document.querySelectorAll(".task");

            allTasks.forEach(task => {
                const checkbox = task.querySelector(".taskCheckbox")
           
                if(checkbox.checked && hideCompletedTasks) {
                    task.style.display = "none";
                } else {
                    task.style.display = "block";
                }
            });

        }

        // Helpers
        function toggleSettings(button) {
            const parent = button.closest(".list, .task");

            const settingsMenu = parent.querySelector(".settingsMenu");

            if (settingsMenu.style.display === "none") {
                settingsMenu.style.display = "block";
            } else {
                settingsMenu.style.display = "none";
            }
        }

        function getParentElement(currentElement, classToFind) {
            const parentElement = currentElement.closest(`.${classToFind}`);
            return parentElement;
        }

        function getParentElementId(currentElement, classToFind) {
            const parentElement = currentElement.closest(`.${classToFind}`);
            return parentElement.dataset[`${classToFind}Id`];
        }

        function getValidatedInput(container, classToFind) {
            const input = container.querySelector(`.${classToFind}`);
            const value = input.value.trim();
            input.value = "";
            if (value === "") return null;
            return value;
        }

        // Initial load data
        loadLists();
    </script>
</body>
</html>
