<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>
    <h1>To Do's</h1>

    <input id="listInput" placeholder="Create a new list">
    <button onclick="addList()">Add List</button>

    <div id="listsContainer"></div>

    <script> 
        function addList() {
            const listName = document.getElementById("listInput").value;

            fetch("/api/lists", {
                method: "POST",
                body: listName
            })
            .then(res => res.text())
            .then(data => console.log(data));
            document.getElementById("listInput").value = "";
            
            loadLists();
        }

        function loadLists() {
            fetch("/api/lists")
            .then(res => res.json())
            .then(lists => {
                const container = document.getElementById("listsContainer");
                container.innerHTML = "";

                lists.forEach(list => {
                    const div = createListElement(list.name, list.listId);
                    container.appendChild(div);
                });
            });
        }

        function createListElement(listName, listId) {
            const div = document.createElement("div");
            div.className = "list";
            div.setAttribute("data-list-id", listId);

            div.innerHTML = `
                <h2>${listName}</h2>
                <input class="taskInput" placeholder="New task">
                <button onclick="addTask(this)">Add</button>
                <button onclick="deleteList(this)">Delete This List</button>
                <ul class="taskList"></ul>
            `;

            return div;
        }

        function deleteList(button) {
            const listDiv = button.closest(".list");
            const listId = listDiv.dataset.listId;

            fetch("/api/lists", {
                method: "DELETE",
                body: listId
            })
            .then(res => res.text())
            .then(data => console.log(data));
            
            loadLists()
        }

        function addTask(button) {
            const listDiv = button.closest(".list");
            const listId = listDiv.dataset.listId;

            const input = listDiv.querySelector(".taskInput");
            const name = input.value;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "POST",
                body: name 
            })
            .then(res => res.text())
            .then(data => console.log(data));
        
            input.value = "";
            
            loadTasks(listDiv);
        }

        function loadTasks(listDiv) {
            const listId = listDiv.dataset.listId;

            fetch(`/api/lists/${listId}/tasks`)
            .then(res => res.json())
            .then(tasks => {
                const taskList = listDiv.querySelector(".taskList");
                taskList.innerHTML = "";

                tasks.forEach(task => {
                    const li = createTaskElement(task.name, task.id, task.completed);
                    taskList.appendChild(li);
                });
            });
        }

        function createTaskElement(taskName, taskId, taskCompletion) {
            const li = document.createElement("li");

            li.className = "task";
            li.setAttribute("data-task-id", taskId);
            li.setAttribute("data-task-completion", taskCompletion)

            li.innerHTML = `
                ${taskName}
                <button>Placeholder</button>
            `;

            return li;
        }
    </script>
</body>
</html>
