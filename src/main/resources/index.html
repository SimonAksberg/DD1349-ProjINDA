<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>To Do's</h1>

    <input id="listInput" placeholder="Create a new list">
    <button onclick="addList()">Add List</button>

    <div id="listsContainer"></div>

    <script> 
        // Render data
        function loadLists() {
            fetch("/api/lists")
            .then(res => res.json())
            .then(lists => {
                const container = document.getElementById("listsContainer");
                container.innerHTML = "";

                lists.forEach(list => {
                    const div = createListElement(list.name, list.listId);
                    container.appendChild(div);
                    loadTasks(div);
                });
            });
        }

        function createListElement(listName, listId) {
            const div = document.createElement("div");
            div.className = "list";
            div.setAttribute("data-list-id", listId);

            div.innerHTML = `
                <h2>${listName}</h2>
                <input class="taskInput" placeholder="New task">
                <button onclick="addTask(this)">Add</button>

                <button onclick="toggleSettings(this)">
                    Settings
                </button>

                <div class="settingsMenu" style="display: none;">
                    <button onclick="deleteList(this)">
                        Delete This List
                    </button>

                    <div>
                        <input class="renameInput" placeholder="New list name">
                        <button onclick="renameList(this)">
                            Rename List
                            </button>
                    </div>
                </div>
                <ul class="taskList"></ul>
            `;

            return div;
        }

        function loadTasks(listDiv) {
            const listId = listDiv.dataset.listId;

            fetch(`/api/lists/${listId}/tasks`)
            .then(res => res.json())
            .then(tasks => {
                const taskList = listDiv.querySelector(".taskList");
                taskList.innerHTML = "";

                tasks.forEach(task => {
                    const li = createTaskElement(task.name, task.id, task.completed);
                    taskList.appendChild(li);
                });
            });
        }

        function createTaskElement(taskName, taskId, taskCompletion) {
            const li = document.createElement("li");

            li.className = "task";
            li.setAttribute("data-task-id", taskId);
            li.setAttribute("data-task-completion", taskCompletion)

            li.innerHTML = `
                <label class="taskContent">
                    <input 
                        type="checkbox" 
                        class="taskCheckbox"
                        ${taskCompletion ? "checked" : ""}
                    >

                    <span class="taskName">
                        ${taskName}
                    </span>
                </label>

                <button onclick="toggleSettings(this)">
                    Settings
                </button>

                <div class="settingsMenu" style="display: none;">
                    <button onclick="deleteTask(this)">
                        Delete This Task
                    </button>

                    <div>
                        <input class="renameInput" placeholder="New task name">
                        <button onclick="renameTask(this)">
                            Rename Task
                        </button>
                    </div>
                </div>
            `;

            const checkbox = li.querySelector(".taskCheckbox");

            checkbox.addEventListener("change", () =>  {
                updateTaskCompletion(li, taskId,taskCompletion);
            });

            return li;
        }

        // Add data
        function addList() {
            const listName = document.getElementById("listInput").value.trim();
            if (listName === "") return;

            fetch("/api/lists", {
                method: "POST",
                body: listName
            })
            .then(res => res.text())
            .then(data => console.log(data));
            document.getElementById("listInput").value = "";
            
            loadLists();
        }

        function addTask(button) {
            const listDiv = button.closest(".list");
            const listId = listDiv.dataset.listId;

            const input = listDiv.querySelector(".taskInput");
            const name = input.value.trim();
            if (name === "") return;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "POST",
                body: name 
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadTasks(listDiv);
            });
        
            input.value = "";
        }

        // Modify data
        function renameList(button) {
            const listDiv = button.closest(".list");

            const listId = listDiv.dataset.listId;

            const newNameInput = listDiv.querySelector(".renameInput");

            const newName = newNameInput.value.trim();
            if (newName === "") return;

            fetch("/api/lists", {
                method: "PUT",
                body: listId + "," + newName 
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadLists();
            });
            
            newNameInput.value = "";

        }

        function renameTask(button) {
            const listDiv = button.closest(".list");

            const listId = listDiv.dataset.listId;

            const taskLi = button.closest(".task");

            const taskId = taskLi.dataset.taskId;

            const newNameInput = taskLi.querySelector(".renameInput");

            const newName = newNameInput.value.trim();
            if (newName === "") return;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "PUT",
                body: "rename" + "," + taskId + "," + newName 
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadTasks(listDiv);
            });
            
            newNameInput.value = "";
        }

        function updateTaskCompletion(li, taskId, taskCompletion) {
            const listDiv = li.closest(".list");
            const listId = listDiv.dataset.listId;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "PUT",
                body: "updateCompletion" + "," + taskId + "," + taskCompletion
            })
            .then(res => res.text())
            .then(data => console.log(data));
        }

        // Delete data 
        function deleteList(button) {
            const listDiv = button.closest(".list");
            const listId = listDiv.dataset.listId;

            fetch("/api/lists", {
                method: "DELETE",
                body: listId
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadLists();
            });
        }

        function deleteTask(button) {
            const listDiv = button.closest(".list");
            const listId = listDiv.dataset.listId;

            const taskLi = button.closest(".task");
            const taskId = taskLi.dataset.taskId;

            fetch(`/api/lists/${listId}/tasks`, {
                method: "DELETE",
                body: taskId
            })
            .then(res => res.text())
            .then(data => {
                console.log(data);
                loadTasks(listDiv);
            });
        }

        // Helpers
        function toggleSettings(button) {
            const settingsMenu = button.nextElementSibling;

            if (settingsMenu.style.display === "none") {
                settingsMenu.style.display = "block";
            } else {
                settingsMenu.style.display = "none";
            }
        }

        // Initial load data
        loadLists();
    </script>
</body>
</html>
